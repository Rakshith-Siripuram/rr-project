<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0"/>
  <title>Hybrid Object Detector</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.20.0/dist/tf.min.js"></script>
<script src="https://unpkg.com/@tensorflow-models/coco-ssd"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="loadingOverlay">
    <h1>HYBRID OBJECT DETECTOR</h1>

    <div class="loader-bar">

      <div class="loader-fill"
           id="loaderFill">
      </div>
    </div>
    <div id="loadMsg">
      DOWNLOADING AI MODELS...
    </div>
    <div id="loadPercent">
      0%
    </div>
  </div>
  <header>
    <div class="logo">
      Hybrid Object Detector
    </div>
    <div>
      <span class="status-dot loading"
            id="statusDot">
      </span>
      <span id="status-text">
        LOADING
      </span>
    </div>
  </header>
  <main>
    <div id="liveView">
      <video id="webcam"
             autoplay
             muted
             playsinline>
      </video>
      <div id="mobileNetLabel"></div>
      <div id="placeholder">
        <div class="cam-icon"></div>
        <span>CAMERA OFF</span>
      </div>
    </div>

    <div class="controls">
      <button id="startBtn"
              disabled>
        ▶ Start Camera
      </button>
      <button id="switchBtn"
              disabled>
        ⇄ Switch Camera
      </button>
      <button id="stopBtn"
              disabled>
        ■ Stop
      </button>
    </div>
    <div id="log">
      Waiting for AI models...
    </div>
    <div class="voice-hint">
      Voice commands:
      <b>"start"</b> ·
      <b>"stop"</b> ·
      <b>"switch"</b>
    </div>
  </main>


  <!-- MAIN SCRIPT -->
  <script src="script.js"></script>

</body>

</html>
